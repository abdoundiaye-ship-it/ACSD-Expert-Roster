<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Expert Roster — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui, -apple-system, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin .75s linear infinite; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-900 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your email to receive a reset link.</p>
    </div>

    <div id="success-msg" class="hidden mb-5 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3"></div>
    <div id="error-msg"   class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>

    <form id="reset-form" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input id="email" type="email" autocomplete="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="you@example.com">
      </div>
      <button type="submit" id="reset-btn"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm
               transition-colors flex items-center justify-center gap-2 disabled:opacity-60">
        Send Reset Link
      </button>
    </form>

    <p class="text-center mt-5">
      <a href="login.html" class="text-sm text-blue-600 hover:underline">← Back to Sign In</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const _sb  = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    const form = document.getElementById('reset-form')
    const btn  = document.getElementById('reset-btn')
    const errDiv = document.getElementById('error-msg')
    const okDiv  = document.getElementById('success-msg')

    // Determine the base URL for the redirect
    const baseUrl = window.location.origin + window.location.pathname.replace('reset-password.html', '')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errDiv.classList.add('hidden')
      okDiv.classList.add('hidden')
      btn.disabled = true
      btn.innerHTML = `
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Sending…`

      const email = document.getElementById('email').value.trim()
      const { error } = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: baseUrl + 'update-password.html',
      })

      if (error) {
        errDiv.textContent = error.message
        errDiv.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      } else {
        form.classList.add('hidden')
        okDiv.textContent = 'Check your email — a password reset link has been sent.'
        okDiv.classList.remove('hidden')
      }
    })
  </script>
</body>
</html>
