<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Expert Roster — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo / branding -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-900 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">ACSD Expert Roster</h1>
      <p class="text-sm text-gray-500 mt-1">Système de gestion du fichier d'experts</p>
    </div>

    <!-- Error message -->
    <div id="error-msg"
      class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
    </div>

    <!-- Login form -->
    <form id="login-form" class="space-y-4" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Adresse e-mail
        </label>
        <input id="email" type="email" autocomplete="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="vous@example.com">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Mot de passe
        </label>
        <input id="password" type="password" autocomplete="current-password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold
               py-2.5 rounded-lg text-sm transition-colors
               flex items-center justify-center gap-2 disabled:opacity-60">
        Se connecter
      </button>
    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Redirect if already authenticated
    _sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html'
    })

    const form   = document.getElementById('login-form')
    const btn    = document.getElementById('login-btn')
    const errDiv = document.getElementById('error-msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errDiv.classList.add('hidden')
      btn.disabled = true
      btn.innerHTML = `
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Connexion…`

      const { error } = await _sb.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      })

      if (error) {
        errDiv.textContent = error.message
        errDiv.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Se connecter'
      } else {
        window.location.href = 'index.html'
      }
    })
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin .75s linear infinite; }
  </style>
</body>
</html>
