<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Expert Intelligence Platform — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin .75s linear infinite; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- Branding + lang toggle -->
    <div class="text-center mb-8">
      <div class="flex justify-end mb-2">
        <div class="flex items-center gap-1 text-xs border border-gray-300 rounded-md overflow-hidden">
          <button id="btn-en" onclick="setLang('en')"
            class="px-2 py-1 transition-colors font-bold bg-blue-900 text-white">EN</button>
          <button id="btn-fr" onclick="setLang('fr')"
            class="px-2 py-1 transition-colors text-gray-400">FR</button>
        </div>
      </div>
      <img src="img/logo.png" alt="ACSD Logo" class="h-20 w-auto mx-auto mb-3">
      <h1 class="text-xl font-bold text-gray-900">ACSD Expert Intelligence Platform</h1>
      <p id="login-subtitle" class="text-sm text-gray-500 mt-1">Expert Roster &amp; Proposal Intelligence</p>
    </div>

    <!-- Error message -->
    <div id="error-msg"
      class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
    </div>

    <!-- Login form -->
    <form id="login-form" class="space-y-4" novalidate>
      <div>
        <label for="email" id="label-email" class="block text-sm font-medium text-gray-700 mb-1">
          Email address
        </label>
        <input id="email" type="email" autocomplete="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="you@example.com">
      </div>
      <div>
        <label for="password" id="label-password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input id="password" type="password" autocomplete="current-password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold
               py-2.5 rounded-lg text-sm transition-colors
               flex items-center justify-center gap-2 disabled:opacity-60">
        Sign in
      </button>
    </form>

    <div class="flex items-center justify-between mt-5 text-xs">
      <a href="reset-password.html" id="forgot-link" class="text-blue-600 hover:underline">
        Forgot password?
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // ── i18n ──────────────────────────────────────────────────────────────────
    const LOGIN_STRINGS = {
      en: {
        subtitle:  'Expert Roster & Proposal Intelligence',
        email:     'Email address',
        password:  'Password',
        signin:    'Sign in',
        signing:   'Signing in…',
        email_ph:  'you@example.com',
      },
      fr: {
        subtitle:  'Fichier d\'experts & intelligence des propositions',
        email:     'Adresse e-mail',
        password:  'Mot de passe',
        signin:    'Se connecter',
        signing:   'Connexion…',
        email_ph:  'vous@example.com',
      }
    }

    let LANG = 'en'

    function setLang(lang) {
      LANG = lang
      const s = LOGIN_STRINGS[lang] || LOGIN_STRINGS.en
      document.getElementById('login-subtitle').textContent   = s.subtitle
      document.getElementById('label-email').textContent      = s.email
      document.getElementById('label-password').textContent   = s.password
      document.getElementById('login-btn').textContent        = s.signin
      document.getElementById('email').placeholder            = s.email_ph
      document.documentElement.lang = lang
      document.getElementById('btn-en').classList.toggle('bg-blue-900',  lang === 'en')
      document.getElementById('btn-en').classList.toggle('text-white',   lang === 'en')
      document.getElementById('btn-en').classList.toggle('text-gray-400',lang !== 'en')
      document.getElementById('btn-fr').classList.toggle('bg-blue-900',  lang === 'fr')
      document.getElementById('btn-fr').classList.toggle('text-white',   lang === 'fr')
      document.getElementById('btn-fr').classList.toggle('text-gray-400',lang !== 'fr')
    }

    // Apply saved language on load
    setLang(LANG)

    // ── Auth ──────────────────────────────────────────────────────────────────
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    _sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html'
    })

    const form   = document.getElementById('login-form')
    const btn    = document.getElementById('login-btn')
    const errDiv = document.getElementById('error-msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errDiv.classList.add('hidden')
      btn.disabled = true
      const s = LOGIN_STRINGS[LANG] || LOGIN_STRINGS.en
      btn.innerHTML = `
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        ${s.signing}`

      const { error } = await _sb.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      })

      if (error) {
        errDiv.textContent = error.message
        errDiv.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = s.signin
      } else {
        window.location.href = 'index.html'
      }
    })
  </script>
</body>
</html>
