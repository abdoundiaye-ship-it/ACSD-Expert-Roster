<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Admin — Roles & Permissions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-blue-950 text-white shadow sticky top-0 z-30">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-sm tracking-tight">ACSD — Admin Panel</span>
      <div class="flex items-center gap-3">
        <span id="admin-user-email" class="text-xs text-blue-300 hidden sm:block"></span>
        <button id="admin-logout-btn"
          class="text-xs bg-blue-900 hover:bg-blue-800 px-3 py-1.5 rounded-lg transition-colors">
          Sign out
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-screen-xl mx-auto px-4 py-6 flex gap-6">
    <aside class="w-48 flex-shrink-0">
      <nav id="admin-nav" class="bg-white rounded-xl shadow-sm border border-gray-200 p-2 space-y-0.5 sticky top-20"></nav>
      <div class="mt-4 px-1">
        <a href="../index.html" class="text-xs text-gray-400 hover:text-blue-600 transition-colors">← Back to Roster</a>
      </div>
    </aside>

    <main class="flex-1 min-w-0 space-y-5">

      <div>
        <h2 class="text-lg font-bold text-gray-900">Roles & Permissions</h2>
        <p class="text-sm text-gray-500 mt-0.5">Configure which permissions are assigned to each role.</p>
      </div>

      <div class="bg-amber-50 border border-amber-200 text-amber-800 text-xs rounded-xl px-4 py-3">
        Changes take effect immediately for all users in that role. The Admin role always retains full access even if all checkboxes are cleared.
      </div>

      <div id="roles-container" class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 animate-pulse h-64"></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 animate-pulse h-64"></div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    let allPermissions = []
    let rolePermMap    = {}  // role → Set of permission_ids

    async function loadRoles() {
      const session = await initAdmin('roles')
      if (!session) return

      const [permRes, rpRes] = await Promise.all([
        sb.from('permissions').select('id, name, description').order('sort_order'),
        sb.from('role_permissions').select('role, permission_id'),
      ])

      allPermissions = permRes.data ?? []
      rolePermMap = {}
      ;(rpRes.data ?? []).forEach(({ role, permission_id }) => {
        if (!rolePermMap[role]) rolePermMap[role] = new Set()
        rolePermMap[role].add(permission_id)
      })

      const roles = ['admin', 'viewer']
      document.getElementById('roles-container').innerHTML = roles.map(role => {
        const isAdmin = role === 'admin'
        return `
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <h3 class="font-bold text-gray-900 text-sm capitalize">${aesc(role)}</h3>
              ${isAdmin ? '<span class="text-xs bg-amber-100 text-amber-700 font-semibold px-2 py-0.5 rounded-full">Full Access</span>' : ''}
            </div>
            ${!isAdmin ? `
            <button onclick="saveRolePermissions('${role}')"
              class="text-xs bg-blue-900 hover:bg-blue-800 text-white font-medium px-3 py-1.5 rounded-lg transition-colors">
              Save Changes
            </button>` : ''}
          </div>
          <div class="space-y-2">
            ${allPermissions.map(p => {
              const checked = (rolePermMap[role] ?? new Set()).has(p.id)
              const disabled = isAdmin
              return `
              <label class="flex items-start gap-3 group ${disabled ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'}">
                <input type="checkbox" id="perm-${role}-${p.id}"
                  data-role="${aesc(role)}" data-perm="${aesc(p.id)}"
                  ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}
                  class="mt-0.5 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 flex-shrink-0">
                <div>
                  <p class="text-sm font-medium text-gray-800 leading-tight">${aesc(p.name)}</p>
                  <p class="text-xs text-gray-400 mt-0.5">${aesc(p.description ?? '')}</p>
                </div>
              </label>`
            }).join('')}
          </div>
          ${!isAdmin ? `<p id="rp-status-${role}" class="text-xs text-gray-400 mt-4"></p>` : ''}
        </div>`
      }).join('')
    }

    async function saveRolePermissions(role) {
      const checkboxes  = document.querySelectorAll(`[data-role="${role}"]`)
      const newPermIds  = [...checkboxes].filter(cb => cb.checked).map(cb => cb.dataset.perm)
      const oldPermIds  = [...(rolePermMap[role] ?? new Set())]

      const toAdd    = newPermIds.filter(id => !oldPermIds.includes(id))
      const toRemove = oldPermIds.filter(id => !newPermIds.includes(id))

      const statusEl = document.getElementById(`rp-status-${role}`)
      if (statusEl) statusEl.textContent = 'Saving…'

      try {
        if (toRemove.length) {
          await sb.from('role_permissions').delete()
            .eq('role', role).in('permission_id', toRemove)
        }
        if (toAdd.length) {
          await sb.from('role_permissions').insert(toAdd.map(pid => ({ role, permission_id: pid })))
        }

        await logAudit('UPDATE', 'role', role, role,
          { permissions: oldPermIds }, { permissions: newPermIds })

        // Refresh cache
        rolePermMap[role] = new Set(newPermIds)
        if (statusEl) statusEl.textContent = 'Saved ✓'
        setTimeout(() => { if (statusEl) statusEl.textContent = '' }, 2000)
        showToast(`${role} permissions saved.`)
      } catch (err) {
        if (statusEl) statusEl.textContent = 'Error: ' + err.message
        showToast('Save failed: ' + err.message, 'error')
      }
    }

    loadRoles()
  </script>
</body>
</html>
