<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Admin — Audit Logs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .expanded { display: table-row !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-blue-950 text-white shadow sticky top-0 z-30">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-sm tracking-tight">ACSD — Admin Panel</span>
      <div class="flex items-center gap-3">
        <span id="admin-user-email" class="text-xs text-blue-300 hidden sm:block"></span>
        <button id="admin-logout-btn"
          class="text-xs bg-blue-900 hover:bg-blue-800 px-3 py-1.5 rounded-lg transition-colors">
          Sign out
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-screen-xl mx-auto px-4 py-6 flex gap-6">
    <aside class="w-48 flex-shrink-0">
      <nav id="admin-nav" class="bg-white rounded-xl shadow-sm border border-gray-200 p-2 space-y-0.5 sticky top-20"></nav>
      <div class="mt-4 px-1">
        <a href="../index.html" class="text-xs text-gray-400 hover:text-blue-600 transition-colors">← Back to Roster</a>
      </div>
    </aside>

    <main class="flex-1 min-w-0 space-y-5">

      <div>
        <h2 class="text-lg font-bold text-gray-900">Audit Logs</h2>
        <p class="text-sm text-gray-500 mt-0.5">Complete trail of security-relevant and data-change events.</p>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-3 items-center">
        <select id="f-action"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All actions</option>
          <option value="LOGIN">LOGIN</option>
          <option value="LOGOUT">LOGOUT</option>
          <option value="SESSION_TIMEOUT">SESSION_TIMEOUT</option>
          <option value="CREATE">CREATE</option>
          <option value="UPDATE">UPDATE</option>
          <option value="DELETE">DELETE</option>
          <option value="ACTIVATE">ACTIVATE</option>
          <option value="DEACTIVATE">DEACTIVATE</option>
          <option value="ASSIGN_ROLE">ASSIGN_ROLE</option>
          <option value="REVOKE_ROLE">REVOKE_ROLE</option>
        </select>

        <select id="f-entity"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All entity types</option>
          <option value="session">Session</option>
          <option value="user">User</option>
          <option value="expert">Expert</option>
          <option value="role">Role</option>
        </select>

        <input id="f-user" type="search" placeholder="Filter by user email…"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-52">

        <button onclick="applyFilters()"
          class="bg-blue-900 hover:bg-blue-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          Apply
        </button>
        <button onclick="resetFilters()"
          class="border border-gray-300 text-gray-600 hover:bg-gray-50 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          Reset
        </button>
      </div>

      <div id="log-count" class="text-sm text-gray-500 font-medium"></div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wide">
              <th class="text-left px-5 py-3 w-36">Timestamp</th>
              <th class="text-left px-5 py-3">User</th>
              <th class="text-left px-5 py-3 w-32">Action</th>
              <th class="text-left px-5 py-3 hidden md:table-cell w-24">Entity Type</th>
              <th class="text-left px-5 py-3 hidden lg:table-cell">Entity</th>
              <th class="text-center px-5 py-3 w-16">Details</th>
            </tr>
          </thead>
          <tbody id="audit-tbody" class="divide-y divide-gray-100">
            <tr><td colspan="6" class="px-5 py-6 text-center text-xs text-gray-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between">
        <p id="page-info" class="text-xs text-gray-400"></p>
        <div class="flex gap-2">
          <button id="btn-prev" onclick="prevPage()" disabled
            class="text-xs border border-gray-300 text-gray-600 hover:bg-gray-50 px-3 py-1.5 rounded-lg disabled:opacity-40 disabled:cursor-not-allowed">
            ← Previous
          </button>
          <button id="btn-next" onclick="nextPage()"
            class="text-xs border border-gray-300 text-gray-600 hover:bg-gray-50 px-3 py-1.5 rounded-lg disabled:opacity-40 disabled:cursor-not-allowed">
            Next →
          </button>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    const PAGE_SIZE = 50
    let currentPage = 0
    let totalCount  = 0
    let activeFilters = {}

    async function loadAuditPage() {
      const session = await initAdmin('audit')
      if (!session) return
      await fetchPage()
    }

    async function fetchPage() {
      const from = currentPage * PAGE_SIZE
      const to   = from + PAGE_SIZE - 1

      let query = sb.from('audit_logs')
        .select('id, timestamp, user_email, action, entity_type, entity_id, entity_name, previous_values, new_values',
          { count: 'exact' })
        .order('timestamp', { ascending: false })
        .range(from, to)

      if (activeFilters.action) query = query.eq('action', activeFilters.action)
      if (activeFilters.entity) query = query.eq('entity_type', activeFilters.entity)
      if (activeFilters.user)   query = query.ilike('user_email', `%${activeFilters.user}%`)

      const { data, count, error } = await query

      if (error) {
        document.getElementById('audit-tbody').innerHTML =
          `<tr><td colspan="6" class="px-5 py-6 text-center text-xs text-red-500">Error: ${aesc(error.message)}</td></tr>`
        return
      }

      totalCount = count ?? 0
      renderTable(data ?? [])
      updatePagination()
    }

    function renderTable(rows) {
      const countEl = document.getElementById('log-count')
      countEl.textContent = `${totalCount.toLocaleString()} event${totalCount !== 1 ? 's' : ''} total`

      const tbody = document.getElementById('audit-tbody')
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-6 text-center text-xs text-gray-400">No events match your filters.</td></tr>'
        return
      }

      tbody.innerHTML = rows.map(l => {
        const hasDiff = l.previous_values || l.new_values
        return `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-5 py-3 text-xs text-gray-400 whitespace-nowrap">${fmtDate(l.timestamp)}</td>
          <td class="px-5 py-3 text-xs text-gray-700 max-w-0">
            <span class="truncate block">${aesc(l.user_email)}</span>
          </td>
          <td class="px-5 py-3">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${actionColor(l.action)}">
              ${aesc(l.action)}
            </span>
          </td>
          <td class="px-5 py-3 text-xs text-gray-500 hidden md:table-cell capitalize">${aesc(l.entity_type ?? '—')}</td>
          <td class="px-5 py-3 text-xs text-gray-600 hidden lg:table-cell">${aesc(l.entity_name ?? l.entity_id ?? '—')}</td>
          <td class="px-5 py-3 text-center">
            ${hasDiff ? `
            <button onclick="toggleDiff('diff-${aesc(l.id)}')"
              class="text-xs text-blue-500 hover:text-blue-700 font-medium">view</button>` : '—'}
          </td>
        </tr>
        ${hasDiff ? `
        <tr id="diff-${aesc(l.id)}" class="hidden bg-gray-50 border-t-0">
          <td colspan="6" class="px-5 py-3">
            <div class="grid grid-cols-2 gap-4 text-xs">
              ${l.previous_values ? `
              <div>
                <p class="font-semibold text-gray-500 mb-1">Previous</p>
                <pre class="bg-red-50 border border-red-100 rounded p-2 text-gray-700 overflow-x-auto whitespace-pre-wrap break-all">${aesc(JSON.stringify(l.previous_values, null, 2))}</pre>
              </div>` : ''}
              ${l.new_values ? `
              <div>
                <p class="font-semibold text-gray-500 mb-1">New</p>
                <pre class="bg-green-50 border border-green-100 rounded p-2 text-gray-700 overflow-x-auto whitespace-pre-wrap break-all">${aesc(JSON.stringify(l.new_values, null, 2))}</pre>
              </div>` : ''}
            </div>
          </td>
        </tr>` : ''}
        `
      }).join('')
    }

    function toggleDiff(rowId) {
      const row = document.getElementById(rowId)
      if (row) row.classList.toggle('hidden')
    }

    function actionColor(a) {
      if (!a) return 'bg-gray-100 text-gray-600'
      if (['LOGIN','LOGOUT'].includes(a))          return 'bg-blue-100 text-blue-700'
      if (['CREATE'].includes(a))                   return 'bg-green-100 text-green-700'
      if (['UPDATE','ASSIGN_ROLE'].includes(a))     return 'bg-amber-100 text-amber-700'
      if (['DELETE','REVOKE_ROLE'].includes(a))     return 'bg-red-100 text-red-700'
      if (['ACTIVATE'].includes(a))                 return 'bg-teal-100 text-teal-700'
      return 'bg-gray-100 text-gray-600'
    }

    function updatePagination() {
      const totalPages = Math.ceil(totalCount / PAGE_SIZE)
      document.getElementById('page-info').textContent =
        `Page ${currentPage + 1} of ${totalPages} · ${totalCount.toLocaleString()} events`
      document.getElementById('btn-prev').disabled = currentPage === 0
      document.getElementById('btn-next').disabled = currentPage >= totalPages - 1
    }

    async function prevPage() { if (currentPage > 0) { currentPage--; await fetchPage() } }
    async function nextPage() { currentPage++; await fetchPage() }

    async function applyFilters() {
      activeFilters = {
        action: document.getElementById('f-action').value,
        entity: document.getElementById('f-entity').value,
        user:   document.getElementById('f-user').value.trim(),
      }
      currentPage = 0
      await fetchPage()
    }

    async function resetFilters() {
      document.getElementById('f-action').value = ''
      document.getElementById('f-entity').value = ''
      document.getElementById('f-user').value   = ''
      activeFilters = {}
      currentPage = 0
      await fetchPage()
    }

    loadAuditPage()
  </script>
</body>
</html>
