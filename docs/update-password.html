<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACSD Expert Intelligence Platform — Set New Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui, -apple-system, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin .75s linear infinite; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-900 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">Set New Password</h1>
      <p class="text-sm text-gray-500 mt-1">Choose a strong password for your account.</p>
    </div>

    <div id="error-msg" class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>
    <div id="invalid-link" class="hidden">
      <div class="bg-amber-50 border border-amber-200 text-amber-700 text-sm rounded-lg px-4 py-3 mb-4">
        This link is invalid or has expired. Please request a new password reset.
      </div>
      <a href="reset-password.html"
        class="block text-center text-sm text-blue-600 hover:underline">Request new link</a>
    </div>

    <form id="update-form" class="space-y-4" novalidate>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          New Password <span class="text-xs text-gray-400">(min. 8 characters)</span>
        </label>
        <input id="password" type="password" required minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <div>
        <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input id="password2" type="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <button type="submit" id="update-btn"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm
               transition-colors flex items-center justify-center gap-2 disabled:opacity-60">
        Update Password
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Supabase sends the recovery token in the URL hash — exchange it for a session
    _sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is now active — user can update their password
        document.getElementById('update-form').classList.remove('hidden')
        document.getElementById('invalid-link').classList.add('hidden')
      }
    })

    // Check for error in hash (e.g., expired link)
    const hash = new URLSearchParams(window.location.hash.replace('#', '?').slice(1))
    if (hash.get('error')) {
      document.getElementById('update-form').classList.add('hidden')
      document.getElementById('invalid-link').classList.remove('hidden')
    }

    const form   = document.getElementById('update-form')
    const btn    = document.getElementById('update-btn')
    const errDiv = document.getElementById('error-msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errDiv.classList.add('hidden')

      const pw1 = document.getElementById('password').value
      const pw2 = document.getElementById('password2').value

      if (pw1.length < 8) {
        errDiv.textContent = 'Password must be at least 8 characters.'
        errDiv.classList.remove('hidden')
        return
      }
      if (pw1 !== pw2) {
        errDiv.textContent = 'Passwords do not match.'
        errDiv.classList.remove('hidden')
        return
      }

      btn.disabled = true
      btn.innerHTML = `
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Updating…`

      const { error } = await _sb.auth.updateUser({ password: pw1 })
      if (error) {
        errDiv.textContent = error.message
        errDiv.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Update Password'
      } else {
        form.innerHTML = `
          <div class="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4">
            Password updated successfully.
          </div>
          <a href="login.html"
            class="block text-center w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold
                   py-2.5 rounded-lg text-sm transition-colors">
            Sign In
          </a>`
      }
    })
  </script>
</body>
</html>
